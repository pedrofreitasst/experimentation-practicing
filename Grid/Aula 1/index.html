<!DOCTYPE html>
<html>
    <head>
        <title>Using CSS Grid</title>
        <style>
            body{
        color: #fff;
        font-family: 'arial';
        font-weight: bold;
        text-align: center;
    }
    #content{
        display: grid;
        /* grid-template-columns:30% 20% 50%; */
        /* grid-template-columns: 1fr 1fr 1fr; */
        grid-template-columns: repeat(3,1fr);
        grid-template-rows: repeat(3, minmax(100px, auto));
        max-width: 960px;
        margin: 0 auto;
        grid-column-gap: 10px;
        grid-row-gap: 10px;
        /* grid-gap: 10px; */
        /* grid-auto-rows: minmax(200px, auto); */
        
    }
    #content div{
        background: #3bbced;
        padding: 30px;
    }
    #content div:nth-child(even){
        background: #777;
    }
        </style>
    </head>
    <body>
        <div id="content">
            <div>1</div>
            <div>2</div>
            <div>Lorem ipsum dolor sit amet consectetur adipisicing elit. Delectus cupiditate quidem numquam ipsum voluptate distinctio quas, quia obcaecati reprehenderit, magni provident minima ea nostrum similique ullam consequuntur veritatis, quae dolore?</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>
            <div>8</div>
            <div>9</div>
        </div>
    </body>
</html>
